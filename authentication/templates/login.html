<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Login | SpeechCare</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;

            /* Animated Background */
            background: linear-gradient(-45deg, #0f0f0f, #1a1a2e, #16213e, #000);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
        }

        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        /* Glass Card */
        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            width: 350px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
            color: white;
        }

        .login-card h2 {
            margin-bottom: 25px;
            font-weight: 600;
        }

        /* Inputs */
        .form-control {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            border-radius: 10px;
        }

        .form-control::placeholder {
            color: #aaa;
        }

        .form-control:focus {
            box-shadow: 0 0 10px #00c6ff;
            background: rgba(255, 255, 255, 0.15);
        }

        /* Button */
        .btn-login {
            background: #00c6ff;
            border: none;
            border-radius: 20px;
            padding: 10px;
            width: 100%;
            font-weight: bold;
            margin-top: 15px;
            transition: 0.3s;
        }

        .btn-login:hover {
            background: #009edb;
            transform: scale(1.05);
        }

        /* Extra */
        .extra-links {
            margin-top: 15px;
            font-size: 14px;
        }

        .extra-links a {
            color: #00c6ff;
            text-decoration: none;
        }

        .extra-links a:hover {
            text-decoration: underline;
        }

        /* Navbar */
        .navbar {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
        }

        .navbar-brand {
            font-weight: bold;
            color: #00c6ff !important;
        }

        .nav-link {
            color: #ccc !important;
            margin: 0 10px;
        }

        .nav-link:hover {
            color: #00c6ff !important;
        }

        /* Fix overlap (VERY IMPORTANT) */
        body {
            padding-top: 80px;
        }
    </style>
</head>

<body>
    <!-- 🔷 Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark px-4 fixed-top">
        <a class="navbar-brand" href="/">SpeechCare</a>

        <div class="ms-auto">
            <a class="nav-link d-inline" href="/">Home</a>
            <a class="nav-link d-inline" href="/#about">About</a>
            <a class="nav-link d-inline" href="/#contact">Contact</a>
            {% if user.is_authenticated %}
            <span class="nav-link d-inline text-info">
                {{ user.email }}
            </span>

            <a href="/logout" class="btn btn-outline-danger ms-2">Logout</a>
            {% else %}

            <a href="/login" class="btn btn-outline-info ms-2">Login</a>
            <a href="/register" class="btn btn-info ms-2">Register</a>
            {% endif %}
        </div>
    </nav>

    <div class="login-card">
        <h2>Welcome Back 👋</h2>

        <form method="POST">
            {% csrf_token %} 

            <input type="text" name="username" class="form-control mb-3" placeholder="Username">

            <input type="password" name="password" class="form-control mb-3" placeholder="Password">

            <button type="submit" class="btn btn-login">Login</button>
        </form>

        <div class="extra-links">
            <p>Don't have an account? <a href="/register">Register</a></p>
        </div>
    </div>

</body>

</html>
