<!DOCTYPE html>
<html>
<head>
    <title>Assign Therapist</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f4f6f9;
        }

        /* 🔷 Navbar */
        .navbar {
            background: #1e293b;
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-weight: bold;
        }

        .nav-links a:hover {
            color: #38bdf8;
        }

        /* 🔷 Container */
        .container {
            max-width: 600px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
        }

        label {
            font-weight: bold;
        }

        select {
            width: 100%;
            padding: 10px;
            margin: 10px 0 20px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }
    </style>
</head>
<body>

    <!-- 🔷 NAVBAR -->
    <div class="navbar">
        <div><b>Admin Panel</b></div>
        <div class="nav-links">
            <a href="{% url 'admin_dashboard' %}">Dashboard</a>
            <a href="{% url 'add_user' %}">Add User</a>
            <a href="{% url 'assign_therapist' %}">Assign Therapist</a>
            <a href="{% url 'assign_supervisor' %}">Assign Supervisor</a>
            <a href="{% url 'logout' %}">Logout</a>
        </div>
    </div>

    <!-- 🔷 FORM -->
    <div class="container">
        <h2>Assign Therapist to Patient</h2>

        <form method="POST">
            {% csrf_token %}

            <label>Select Patient</label>
            <select name="patient_id">
                {% for p in patients %}
                    <option value="{{ p.id }}">{{ p.username }}</option>
                {% endfor %}
            </select>

            <label>Select Therapist</label>
            <select name="therapist_id">
                {% for t in therapists %}
                    <option value="{{ t.id }}">{{ t.username }}</option>
                {% endfor %}
            </select>

            <button type="submit">Assign</button>
        </form>
    </div>

</body>
</html>
