<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Register | SpeechCare</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #0f0f0f, #1a1a2e, #16213e, #000);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            padding-top: 80px;
        }

        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        /* Navbar */
        .navbar {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
        }

        .navbar-brand {
            font-weight: bold;
            color: #00c6ff !important;
        }

        .nav-link {
            color: #ccc !important;
            margin: 0 10px;
        }

        .nav-link:hover {
            color: #00c6ff !important;
        }

        /* Card */
        .register-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            padding: 35px;
            border-radius: 20px;
            width: 400px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            color: white;
            text-align: center;
        }

        .register-card h2 {
            margin-bottom: 20px;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            border-radius: 10px;
        }

        .form-control::placeholder {
            color: #aaa;
        }

        .form-control:focus {
            box-shadow: 0 0 10px #00c6ff;
            background: rgba(255, 255, 255, 0.15);
        }

        .btn-register {
            background: #00c6ff;
            border: none;
            border-radius: 20px;
            padding: 10px;
            width: 100%;
            margin-top: 15px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-register:hover {
            background: #009edb;
            transform: scale(1.05);
        }

        .extra-links {
            margin-top: 15px;
            font-size: 14px;
        }

        .extra-links a {
            color: #00c6ff;
            text-decoration: none;
        }

        .extra-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <!-- 🔷 Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark px-4 fixed-top">
        <a class="navbar-brand" href="/">SpeechCare</a>

        <div class="ms-auto">
            <a class="nav-link d-inline" href="/">Home</a>
            <a class="nav-link d-inline" href="/#about">About</a>
            <a class="nav-link d-inline" href="/#contact">Contact</a>

            <a href="/login" class="btn btn-outline-info ms-2">Login</a>
            <a href="/register" class="btn btn-info ms-2">Register</a>
        </div>
    </nav>

    <!-- 🔥 Register Card -->
    <div class="register-card">
        <h2>EDIT USER DETAILS </h2>

        <form method="POST">
        {% csrf_token %}

        <input type="text" name="username" class="form-control mb-3" value="{{ user.username }}">

        <input type="email" name="email" class="form-control mb-3" value="{{ user.email }}">

        <input type="password" name="password" class="form-control mb-3" placeholder="Password">

        <!-- Role Selection -->
        <select name="role" class="form-control mb-3">
            <option value="admin" {% if user.role == 'admin' %}selected{% endif %}>Admin</option>
        <option value="supervisor" {% if user.role == 'supervisor' %}selected{% endif %}>Supervisor</option>
        <option value="therapist" {% if user.role == 'therapist' %}selected{% endif %}>Therapist</option>
        <option value="patient" {% if user.role == 'patient' %}selected{% endif %}>Patient</option>
        </select>

        <button type="submit" class="btn btn-register">Update</button>
    </form>

    </div>

</body>

</html>
