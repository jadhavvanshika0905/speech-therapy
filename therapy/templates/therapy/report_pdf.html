<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            color: #333;
        }

        .header {
            text-align: center;
            border-bottom: 2px solid #2c3e50;
            padding-bottom: 10px;
        }

        .title {
            font-size: 24px;
            font-weight: bold;
        }

        .sub {
            font-size: 14px;
            color: gray;
        }

        .section {
            margin-top: 20px;
        }

        .label {
            font-weight: bold;
            color: #2c3e50;
        }

        .box {
            border: 1px solid #ddd;
            padding: 15px;
            margin-top: 10px;
            border-radius: 5px;
            background: #f9f9f9;
        }

        .footer {
            margin-top: 40px;
            font-size: 12px;
            text-align: center;
            color: gray;
        }
    </style>
</head>

<body>

<div class="header">
    <div class="title">Speech Therapy Report</div>
    <div class="sub">Confidential Medical Document</div>
</div>

<div class="section">
    <p><span class="label">Patient Name:</span> {{ report.plan.patient.name }}</p>
    <p><span class="label">Plan ID:</span> {{ report.plan.id }}</p>
</div>

<div class="section">
    <p class="label">Therapy Summary</p>
    <div class="box">
        <pre style="white-space: pre-wrap;">{{ report.summary }}</pre>
    </div>
</div>

<div class="section">
    <p><span class="label">Status:</span> {{ report.status|default:"Completed" }}</p>
</div>

<div class="footer">
    Generated by Speech Therapy System | Confidential
</div>

</body>
</html>
