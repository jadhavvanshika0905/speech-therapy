<!DOCTYPE html>
<html>
<head>
    <title>Add Feedback</title>
</head>

<body>

<h2>Give Feedback</h2>

<p>Patient: {{ plan.patient.name }}</p>

<form method="POST">
    {% csrf_token %}

    <textarea name="feedback" rows="5" cols="50" placeholder="Write supervisor feedback..."></textarea>

    <br><br>

    <label>Rating:</label>
    <select name="rating">
        <option value="1">⭐ 1</option>
        <option value="2">⭐⭐ 2</option>
        <option value="3">⭐⭐⭐ 3</option>
        <option value="4">⭐⭐⭐⭐ 4</option>
        <option value="5">⭐⭐⭐⭐⭐ 5</option>
    </select>

    <br><br>

    <button type="submit">Submit Feedback</button>
</form>

</body>
</html>
